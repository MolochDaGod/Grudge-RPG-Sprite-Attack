<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grudge Fighter — Character Editor</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh}
        nav{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.08);background:#0d1225}
        nav a{color:#d4af37;text-decoration:none;font-weight:700;font-size:1.1rem}
        nav .sep{color:rgba(255,255,255,0.2)}
        .layout{display:grid;grid-template-columns:220px 1fr 320px;height:calc(100vh - 50px);overflow:hidden}
        .panel{border-right:1px solid rgba(255,255,255,0.06);overflow-y:auto;padding:16px}
        .panel:last-child{border-right:none;border-left:1px solid rgba(255,255,255,0.06)}
        .panel h3{color:#d4af37;font-size:.85rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
        .char-btn{display:block;width:100%;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;cursor:pointer;text-align:left;margin-bottom:6px;transition:all .15s}
        .char-btn:hover{border-color:rgba(212,175,55,0.4);background:rgba(212,175,55,0.08)}
        .char-btn.active{border-color:#d4af37;background:rgba(212,175,55,0.12)}
        .char-btn .name{font-weight:600;font-size:.9rem}
        .char-btn .sub{font-size:.75rem;color:rgba(255,255,255,0.4)}
        .preview-area{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080b15;position:relative}
        .preview-canvas{image-rendering:pixelated;background:#080b15}
        .preview-label{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:#d4af37;font-size:.8rem;font-weight:600;background:rgba(0,0,0,0.7);padding:4px 12px;border-radius:20px}
        .action-row{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
        .action-row label{display:block;font-size:.75rem;color:#d4af37;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
        .action-row select{width:100%;background:#111830;color:#e2e8f0;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 8px;font-size:.85rem;cursor:pointer}
        .action-row select:focus{outline:none;border-color:#d4af37}
        .effect-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}
        .effect-thumb{background:#111830;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:6px;text-align:center;cursor:pointer;transition:all .15s}
        .effect-thumb:hover{border-color:rgba(212,175,55,0.5)}
        .effect-thumb.selected{border-color:#d4af37;background:rgba(212,175,55,0.1)}
        .effect-thumb canvas{image-rendering:pixelated;display:block;margin:0 auto 4px}
        .effect-thumb .lbl{font-size:.65rem;color:rgba(255,255,255,0.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .save-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:#0d1225;border-top:1px solid rgba(212,175,55,0.2);display:flex;align-items:center;justify-content:space-between;z-index:10}
        .save-bar button{padding:10px 24px;border:none;border-radius:6px;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .15s}
        .save-bar button:hover{transform:translateY(-1px)}
        .btn-save{background:linear-gradient(135deg,#d4af37,#b8941f);color:#0a0e1a}
        .btn-export{background:rgba(255,255,255,0.08);color:#d4af37;border:1px solid rgba(212,175,55,0.3)!important}
        .btn-reset{background:rgba(255,80,80,0.15);color:#ff6b6b}
        .toast{position:fixed;top:20px;right:20px;background:#1a3a1a;border:1px solid #4ade80;color:#4ade80;padding:12px 20px;border-radius:8px;font-weight:600;opacity:0;transition:opacity .3s;z-index:100}
        .toast.show{opacity:1}
        @media(max-width:900px){.layout{grid-template-columns:1fr;height:auto}.panel{border:none;border-bottom:1px solid rgba(255,255,255,0.06)}}
    </style>
</head>
<body>
    <nav>
        <a href="./">Grudge Fighter</a>
        <span class="sep">›</span>
        <span style="color:rgba(255,255,255,0.6)">Character Editor</span>
    </nav>

    <div class="layout">
        <!-- Left: Character list -->
        <div class="panel" id="charPanel"></div>

        <!-- Center: Preview -->
        <div class="preview-area">
            <canvas class="preview-canvas" id="previewCanvas" width="400" height="400"></canvas>
            <div class="preview-label" id="previewLabel">Select a character</div>
        </div>

        <!-- Right: Action config -->
        <div class="panel" id="configPanel">
            <h3>Action Assignments</h3>
            <div id="actionList"></div>
            <h3 style="margin-top:20px">Hit Effect</h3>
            <div class="effect-grid" id="effectGrid"></div>
            <h3 style="margin-top:20px">Projectile</h3>
            <div class="effect-grid" id="projGrid"></div>
        </div>
    </div>

    <div class="save-bar">
        <div style="display:flex;gap:8px">
            <button class="btn-save" onclick="saveConfig()">Save to Game</button>
            <button class="btn-export" onclick="exportJSON()">Export JSON</button>
        </div>
        <button class="btn-reset" onclick="resetConfig()">Reset Defaults</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // Game base URL (where the Vercel app serves assets)
    const GAME_URL = 'https://grudge-rpg-sprite-attack-grudgenexus.vercel.app';

    const CHARACTERS = {
        knight: { name:'Knight', folder:'Knight', color:'#e74c3c',
            anims:['Knight-Idle.png','Knight-Walk.png','Knight-Attack01.png','Knight-Attack02.png','Knight-Attack03.png','Knight-Block.png','Knight-Hurt.png','Knight-Death.png'],
            effects:['Knight-Attack01_Effect.png','Knight-Attack02_Effect.png','Knight-Attack03_Effect.png'] },
        archer: { name:'Archer', folder:'Archer', color:'#27ae60',
            anims:['Archer-Idle.png','Archer-Walk.png','Archer-Attack01.png','Archer-Attack02.png','Archer-Hurt.png','Archer-Death.png'],
            effects:['Archer-Attack01_Effect.png','Archer-Attack02_Effect.png'] },
        wizard: { name:'Wizard', folder:'Wizard', color:'#8e44ad',
            anims:['Wizard-Idle.png','Wizard-Walk.png','Wizard-Attack01.png','Wizard-Attack02.png','Wizard-Hurt.png','Wizard-DEATH.png'],
            effects:['Wizard-Attack01_Effect.png','Wizard-Attack02_Effect.png'] },
        orc: { name:'Orc', folder:'Orc', color:'#2ecc71',
            anims:['Orc-Idle.png','Orc-Walk.png','Orc-Attack01.png','Orc-Attack02.png','Orc-Hurt.png','Orc-Death.png'],
            effects:['Orc-attack01_Effect.png','Orc-attack02_Effect.png'] },
        skeleton: { name:'Armored Skeleton', folder:'Armored-Skeleton', color:'#95a5a6',
            anims:['Armored Skeleton-Idle.png','Armored Skeleton-Walk.png','Armored Skeleton-Attack01.png','Armored Skeleton-Attack02.png','Armored Skeleton-Hurt.png','Armored Skeleton-Death.png'],
            effects:['Armored Skeleton-Attack01_Effect.png','Armored Skeleton-Attack02_Effect.png'] },
        swordsman: { name:'Swordsman', folder:'Swordsman', color:'#e67e22',
            anims:['Swordsman-Idle.png','Swordsman-Walk.png','Swordsman-Attack01.png','Swordsman-Attack02.png','Swordsman-Attack3.png','Swordsman-Hurt.png','Swordsman-Death.png'],
            effects:['Swordsman-Attack01_Effect.png','Swordsman-Attack02_Effect.png','Swordsman-Attack3_Effect.png'] },
        priest: { name:'Priest', folder:'Priest', color:'#f1c40f',
            anims:['Priest-Idle.png','Priest-Walk.png','Priest-Attack.png','Priest-Heal.png','Priest-Hurt.png','Priest-Death.png'],
            effects:['Priest-Attack_effect.png','Priest-Heal_Effect.png'] },
    };

    const ALL_EFFECTS = [
        'Archer-Attack01_Effect.png','Archer-Attack02_Effect.png',
        'Armored Skeleton-Attack01_Effect.png','Armored Skeleton-Attack02_Effect.png',
        'Knight-Attack01_Effect.png','Knight-Attack02_Effect.png','Knight-Attack03_Effect.png',
        'Orc-attack01_Effect.png','Orc-attack02_Effect.png',
        'Priest-Attack_effect.png','Priest-Heal_Effect.png',
        'Swordsman-Attack01_Effect.png','Swordsman-Attack02_Effect.png','Swordsman-Attack3_Effect.png',
        'Wizard-Attack01_Effect.png','Wizard-Attack02_Effect.png',
    ];
    const ALL_PROJECTILES = ['Arrow.png','Wizard-Projectile.png'];

    const ACTIONS = [
        { key:'melee_q', label:'Q — Melee Attack', type:'anim' },
        { key:'melee_e', label:'E — Melee Attack', type:'anim' },
        { key:'dash_lmb', label:'LMB — Dash Attack', type:'anim' },
        { key:'ranged_f', label:'F — Ranged', type:'anim' },
        { key:'up_special', label:'W+Q — Up Special', type:'anim' },
        { key:'down_special', label:'S+Q — Down Special / Counter', type:'anim' },
        { key:'super_r', label:'R — Super Attack', type:'anim' },
        { key:'idle', label:'Idle', type:'anim' },
        { key:'run', label:'Run / Walk', type:'anim' },
        { key:'hurt', label:'Take Hit', type:'anim' },
        { key:'death', label:'Death', type:'anim' },
    ];

    const STORAGE_KEY = 'grudge-fighter-char-config';
    let config = loadStoredConfig();
    let selectedChar = null;
    let previewAnim = null;
    let previewFrame = 0;
    let previewTick = 0;

    function loadStoredConfig() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }

    function getCharConfig(charId) {
        if (!config[charId]) config[charId] = {};
        return config[charId];
    }

    // Build character list
    function buildCharPanel() {
        const panel = document.getElementById('charPanel');
        panel.innerHTML = '<h3>Characters</h3>';
        for (const [id, ch] of Object.entries(CHARACTERS)) {
            const btn = document.createElement('button');
            btn.className = 'char-btn' + (selectedChar === id ? ' active' : '');
            btn.innerHTML = `<div class="name" style="color:${ch.color}">${ch.name}</div><div class="sub">${ch.anims.length} animations</div>`;
            btn.onclick = () => selectCharacter(id);
            panel.appendChild(btn);
        }
    }

    function selectCharacter(id) {
        selectedChar = id;
        buildCharPanel();
        buildConfigPanel();
        startPreview();
    }

    function buildConfigPanel() {
        if (!selectedChar) return;
        const ch = CHARACTERS[selectedChar];
        const cc = getCharConfig(selectedChar);

        // Action assignments
        const list = document.getElementById('actionList');
        list.innerHTML = '';
        for (const action of ACTIONS) {
            const row = document.createElement('div');
            row.className = 'action-row';
            const options = ch.anims.map(a => `<option value="${a}" ${cc[action.key] === a ? 'selected' : ''}>${a.replace('.png','')}</option>`).join('');
            row.innerHTML = `<label>${action.label}</label><select data-action="${action.key}">${options}</select>`;
            row.querySelector('select').onchange = (e) => {
                cc[action.key] = e.target.value;
                // Preview selected anim
                loadPreviewAnim(e.target.value);
            };
            list.appendChild(row);
        }

        // Effect grid
        buildEffectGrid('effectGrid', ALL_EFFECTS, 'effects/', cc, 'hitEffect');
        buildEffectGrid('projGrid', ALL_PROJECTILES, 'projectiles/', cc, 'projectile');
    }

    function buildEffectGrid(containerId, items, subpath, cc, configKey) {
        const grid = document.getElementById(containerId);
        grid.innerHTML = '';
        for (const file of items) {
            const thumb = document.createElement('div');
            thumb.className = 'effect-thumb' + (cc[configKey] === file ? ' selected' : '');
            const cvs = document.createElement('canvas');
            cvs.width = 50; cvs.height = 50;
            thumb.appendChild(cvs);
            const lbl = document.createElement('div');
            lbl.className = 'lbl';
            lbl.textContent = file.replace('_Effect.png','').replace('.png','');
            thumb.appendChild(lbl);
            thumb.onclick = () => {
                cc[configKey] = file;
                buildEffectGrid(containerId, items, subpath, cc, configKey);
            };
            grid.appendChild(thumb);

            // Animate thumbnail
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const ctx = cvs.getContext('2d');
                const frames = Math.round(img.width / 100);
                let frame = 0;
                const draw = () => {
                    ctx.clearRect(0,0,50,50);
                    ctx.drawImage(img, frame*100, 0, 100, 100, 0, 0, 50, 50);
                    frame = (frame + 1) % Math.max(1, frames);
                };
                draw();
                setInterval(draw, 120);
            };
            img.src = `${GAME_URL}/fighter2d/${subpath}${file}`;
        }
    }

    // Preview animation
    let previewImg = null;
    function startPreview() {
        if (!selectedChar) return;
        const ch = CHARACTERS[selectedChar];
        loadPreviewAnim(ch.anims[0]);
    }

    function loadPreviewAnim(filename) {
        if (!selectedChar) return;
        const ch = CHARACTERS[selectedChar];
        document.getElementById('previewLabel').textContent = filename.replace('.png','');
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { previewImg = img; previewFrame = 0; previewTick = 0; };
        img.src = `${GAME_URL}/fighter2d/characters/${ch.folder}/${filename}`;
    }

    // Preview render loop
    const pvCanvas = document.getElementById('previewCanvas');
    const pvCtx = pvCanvas.getContext('2d');
    pvCtx.imageSmoothingEnabled = false;

    function renderPreview() {
        pvCtx.clearRect(0, 0, 400, 400);
        if (previewImg && previewImg.complete) {
            const frames = Math.round(previewImg.width / 100);
            const fw = previewImg.width / Math.max(1, frames);
            const fh = previewImg.height;
            const scale = 3;
            const dw = fw * scale, dh = fh * scale;
            pvCtx.drawImage(previewImg, previewFrame * fw, 0, fw, fh, 200 - dw/2, 400 - dh - 20, dw, dh);

            previewTick++;
            if (previewTick >= 6) {
                previewTick = 0;
                previewFrame = (previewFrame + 1) % Math.max(1, frames);
            }
        }
        requestAnimationFrame(renderPreview);
    }
    renderPreview();

    // Save: writes to localStorage AND generates a JSON config file the game reads
    function saveConfig() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));

        // Also save to the game's expected location via postMessage if embedded,
        // or just use localStorage which the game checks on load
        showToast('Configuration saved! Game will load these settings.');
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'grudge-fighter-config.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Config exported as JSON');
    }

    function resetConfig() {
        if (!selectedChar) return;
        delete config[selectedChar];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        buildConfigPanel();
        showToast('Reset to defaults');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Init
    buildCharPanel();
    </script>
</body>
</html>
