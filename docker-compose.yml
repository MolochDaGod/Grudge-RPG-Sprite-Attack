version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: grudge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: grudge
      POSTGRES_PASSWORD: grudge
      POSTGRES_DB: grudge_warlords
    ports:
      - "5432:5432"
    volumes:
      - grudge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grudge -d grudge_warlords"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grudge-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  grudge_pgdata:
